name: Sync rules and skill copies

on:
  push:
    branches: [main]
    paths:
      - skills/m2ui/SKILL.md
      - skills/m2ui/reference/**
      - skills/m2ui/modes/**
      - rules/m2ui-activate.md
      - agents/**

concurrency:
  group: sync-skill
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest before making changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Run structural tests (pre-sync gate)
        run: |
          # Block sync commit if the structural smoke tests fail. A broken
          # SKILL.md / patterns.md / failure-atlas.md will not silently
          # propagate to Cursor / Cline / Copilot / Windsurf / Codex variants.
          bash tests/run-all.sh

      - name: Sync full skill subtree to Codex plugin
        run: |
          # Phase 1 change: copy the entire skills/m2ui/ subtree, not just SKILL.md.
          # The Codex plugin needs reference/, modes/, plus SKILL.md to function.
          # Old behavior (single-file copy) preserved as comment for rollback reference:
          #   cp skills/m2ui/SKILL.md plugins/m2ui/skills/m2ui/SKILL.md
          mkdir -p plugins/m2ui/skills/m2ui
          rsync -a --delete skills/m2ui/ plugins/m2ui/skills/m2ui/

      - name: Sync agents to Codex plugin
        run: |
          # v2.5.0: agents/ dir holds dispatchable subagent definitions
          # (e.g., m2ui-pre-emit-reviewer). Mirror to the Codex plugin variant
          # so it ships with the same agent surface.
          mkdir -p plugins/m2ui/agents
          rsync -a --delete agents/ plugins/m2ui/agents/

      - name: Sync auto-activation rules
        run: |
          BODY="rules/m2ui-activate.md"

          # Cline + Copilot — no frontmatter, direct copy
          mkdir -p .clinerules .github
          cp "$BODY" .clinerules/m2ui.md
          cp "$BODY" .github/copilot-instructions.md

          # Cursor — needs alwaysApply frontmatter
          mkdir -p .cursor/rules
          printf '%s\n' '---' 'description: "m2ui — Metin2 UI code generator. Activate when user creates, modifies, or generates Metin2 client UI code."' 'alwaysApply: true' '---' '' > .cursor/rules/m2ui.mdc
          cat "$BODY" >> .cursor/rules/m2ui.mdc

          # Windsurf — needs always_on frontmatter
          mkdir -p .windsurf/rules
          printf '%s\n' '---' 'trigger: always_on' '---' '' > .windsurf/rules/m2ui.md
          cat "$BODY" >> .windsurf/rules/m2ui.md

      - name: Sync Codex marketplace descriptor
        run: |
          # Codex CLI discovers plugins via .agents/plugins/marketplace.json
          # pointing at the local plugins/m2ui/ subtree. Regenerate on every
          # sync so the descriptor stays in step with the synced subtree.
          mkdir -p .agents/plugins
          cat > .agents/plugins/marketplace.json <<'JSON'
          {
            "name": "m2ui-local",
            "plugins": [
              {
                "name": "m2ui",
                "source": {
                  "source": "local",
                  "path": "./plugins/m2ui"
                },
                "policy": {
                  "installation": "AVAILABLE",
                  "authentication": "ON_INSTALL"
                },
                "category": "Coding"
              }
            ]
          }
          JSON

      - name: Commit and push if changed
        run: |
          git add \
            plugins/m2ui/skills/m2ui \
            plugins/m2ui/agents \
            .clinerules/m2ui.md \
            .github/copilot-instructions.md \
            .cursor/rules/m2ui.mdc \
            .windsurf/rules/m2ui.md \
            .agents/plugins/marketplace.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: sync SKILL.md copies and auto-activation rules [skip ci]"
          git push
